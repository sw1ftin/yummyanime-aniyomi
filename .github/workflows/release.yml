name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build all Release APKs
        run: ./gradlew :yummyanime:assembleRelease

      - name: Clean up APK names
        run: |
          cd yummyanime/build/outputs/apk/release/
          # Переименовываем файлы для удобства (опционально)
          # По умолчанию Gradle создаст что-то вроде yummyanime-arm64-v8a-release.apk
          ls -R

      - name: Create Release and Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          files: yummyanime/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
